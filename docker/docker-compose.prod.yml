version: '3.8'

services:
  # PostgreSQL Database - Production
  postgres:
    image: postgres:15-alpine
    container_name: carbon_coach_db_prod
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: carbon_coach
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    networks:
      - carbon_coach_network

  # Backend API - Production
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: carbon_coach_backend_prod
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/carbon_coach
      OLLAMA_API_URL: ${OLLAMA_API_URL}
      JWT_SECRET: ${JWT_SECRET}
      DEBUG: "False"
      ENVIRONMENT: production
      CORS_ORIGINS: ${CORS_ORIGINS}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    networks:
      - carbon_coach_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend - Production
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: carbon_coach_frontend_prod
    environment:
      VITE_API_URL: ${API_URL}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: always
    networks:
      - carbon_coach_network

volumes:
  postgres_data:

networks:
  carbon_coach_network:
    driver: bridge
