version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: carbon_coach_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: carbon_coach
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: carbon_coach_backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/carbon_coach
      OLLAMA_API_URL: http://ollama:11434
      JWT_SECRET: dev-secret-change-in-production
      DEBUG: "True"
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Frontend
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: carbon_coach_frontend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src

  # Ollama (Local LLM)
  ollama:
    image: ollama/ollama:latest
    container_name: carbon_coach_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: 0.0.0.0:11434

volumes:
  postgres_data:
  ollama_data:

networks:
  default:
    name: carbon_coach_network
